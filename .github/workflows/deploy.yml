name: Deploy site to GitHub Pages

# The Python build runs locally (it needs the private source data), so CI only
# publishes the pre-built static site in site/ (incl. the anonymized data/*.json).

on:
  push:
    branches: [main]
    paths: ["site/**", ".github/workflows/deploy.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
